version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    container_name: globaldisparos_postgres
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icit0707}
      POSTGRES_DB: ${DB_NAME:-globaldisparos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - globaldisparos_network

  # Redis Cache
  redis:
    container_name: globaldisparos_redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - globaldisparos_network

  # Evolution API with Baileys
  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v1.7.4
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH,OPTIONS
      - CORS_CREDENTIALS=true
      - LOG_LEVEL=debug
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=myfKey123456789
      - GLOBAL_API_KEY=myfKey123456789
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - AUTHENTICATION_INSTANCE_FALLBACK=true
      - INTEGRATION=WHATSAPP-BAILEYS
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - globaldisparos_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  globaldisparos_network:
    driver: bridge
