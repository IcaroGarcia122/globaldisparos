version: '3.8'

services:
  evolution-api:
    container_name: evolution_api_simple
    image: atendai/evolution-api:v1.7.4
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH,OPTIONS
      - CORS_CREDENTIALS=true
      - LOG_LEVEL=debug
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=myfKey123456789
      - GLOBAL_API_KEY=myfKey123456789  
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - AUTHENTICATION_INSTANCE_FALLBACK=true
      - INTEGRATION=WHATSAPP-BAILEYS
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes: {}
networks:
  default:
    name: evolution_simple_network
